services:
  db:
    image: postgres:15
    container_name: monitor_commodities_db
    environment:
      - POSTGRES_USER=analista_dev
      - POSTGRES_PASSWORD=password123
      - POSTGRES_DB=commodities_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql

  grafana:
    image: grafana/grafana-oss
    container_name: monitor_grafana
    ports:
      - "3000:3000"
    depends_on:
      - db

  extractor_service:
    build: ./extrator
    container_name: monitor_python_app
    depends_on:
      - db
    env_file:
      - ./extrator/.env
    environment:
      - DB_HOST=db 
    restart: always
    healthcheck:
      test: ["CMD", "python", "-c", "import os; exit(0 if os.path.exists('monitor.log') else 1)"]
      interval: 1m
      timeout: 10s
      retries: 3

volumes:
  postgres_data: